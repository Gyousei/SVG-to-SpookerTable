<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    A simple 5-petal flower: 10 vertices alternating between petal
    tips (radius 40) and the valleys between them (radius 15), all
    centred at (50, 50). Closed by "Z".
  -->
  <path d="
    M 50 10
    L 41.18 37.86
    L 11.96 37.64
    L 35.73 54.64
    L 26.49 82.36
    L 50.00 65.00
    L 73.51 82.36
    L 64.27 54.64
    L 88.04 37.64
    L 58.82 37.86
    Z
  " fill="#ffd84d" stroke="#996622" stroke-width="0.4"/>
</svg>
